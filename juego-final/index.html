<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hunger Games - Pro</title>
    <style>
body {
    background: radial-gradient(circle, #1a2a3a 0%, #050505 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    color: white;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; /* Evita scrolls innecesarios */
}

h1 {
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 8px;
    text-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
    font-size: 2.5rem;
}

.game-container {
    position: relative;
    /* Tamaño grande del contenedor */
    width: 800px; 
    height: 800px;
    border: 6px solid #34495e;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), 0 0 20px rgba(46, 204, 113, 0.1);
    background-color: #2c3e50;
}

canvas {
    display: block;
    /* Importante: el canvas ocupa todo el contenedor */
    width: 100%;
    height: 100%;
    image-rendering: pixelated; /* Si usas pixel art, esto lo mantiene nítido */
}

/* Menú Overlay Centrado */
#menu-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    border-radius: 6px;
}

.hidden { display: none !important; }

/* Botones con estilo Gaming */
button {
    padding: 18px 45px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(145deg, #2ecc71, #27ae60);
    color: white;
    border: none;
    border-radius: 8px;
    margin: 15px;
    text-transform: uppercase;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: all 0.2s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
}

button#reset-btn {
    background: linear-gradient(145deg, #e74c3c, #c0392b);
    position: absolute;
    bottom: -80px; /* Lo bajamos fuera del cuadro del juego */
    padding: 10px 25px;
    font-size: 16px;
}
    </style>
</head>
<body>
    <h1>Hunger Games</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div id="menu-overlay">
            <h2 id="menu-title">¿Listo para la caza?</h2>
            <button id="start-btn">EMPEZAR PARTIDA</button>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button id="reset-btn" class="hidden">REINICIAR</button>
    </div>

    <script type="module" src="/src/App.ts"></script>
</body>
</html>
